version: '3.8'

services:
  db:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: azad_edu
      POSTGRES_PASSWORD: azad_edu_password
      POSTGRES_DB: azad_edu
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U azad_edu"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
